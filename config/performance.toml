# Performance Optimization Configuration for Merlin AI Router

[monitoring]
# Monitoring interval in seconds
interval = 30

# Alert thresholds
cpu_threshold = 80.0          # CPU usage percentage threshold
memory_threshold = 85.0       # Memory usage percentage threshold
disk_threshold = 90.0         # Disk usage percentage threshold
response_time_threshold = 100 # Response time threshold in milliseconds
error_rate_threshold = 1.0    # Error rate percentage threshold

[cache]
# Cache configuration
ttl = "1h"                     # Cache time-to-live
max_size = 10000             # Maximum cache size
eviction_policy = "LRU"       # Cache eviction policy

[connection_pool]
# Connection pooling configuration
pool_size = 10                # Connection pool size
max_lifetime = "1h"           # Maximum connection lifetime
idle_timeout = "5m"           # Idle connection timeout

[queue]
# Queue configuration
size_limit = 1000             # Maximum queue size
processing_timeout = "30s"    # Queue processing timeout

[scaling]
# Auto-scaling configuration
enabled = true                # Enable auto-scaling
cpu_scale_up_threshold = 80.0  # CPU threshold for scaling up
cpu_scale_down_threshold = 30.0 # CPU threshold for scaling down
memory_scale_up_threshold = 85.0 # Memory threshold for scaling up
memory_scale_down_threshold = 40.0 # Memory threshold for scaling down
scale_up_ratio = 1.5          # Scale up ratio
scale_down_ratio = 0.8        # Scale down ratio
min_replicas = 3              # Minimum number of replicas
max_replicas = 10             # Maximum number of replicas

[optimization]
# General optimization settings
enabled = true                # Enable performance optimization
auto_optimization = true      # Enable automatic optimization
recommendation_engine = true   # Enable optimization recommendations
real_time_monitoring = true   # Enable real-time monitoring

[load_balancing]
# Load balancing configuration
strategy = "round_robin"      # Load balancing strategy
health_check_interval = "30s" # Health check interval
max_retries = 3               # Maximum retry attempts
retry_delay = "1s"           # Retry delay

[compression]
# Compression configuration
enabled = true                # Enable compression
algorithm = "gzip"            # Compression algorithm
level = 6                     # Compression level (1-9)
min_size = 1024               # Minimum size for compression

[database]
# Database optimization
query_timeout = "10s"         # Query timeout
batch_size = 100              # Batch size for bulk operations
connection_timeout = "5s"     # Connection timeout
max_connections = 20          # Maximum database connections

[network]
# Network optimization
timeout = "30s"               # Network timeout
keep_alive = true             # Enable keep-alive
max_connections = 1000        # Maximum network connections
buffer_size = 8192            # Buffer size in bytes

[tracing]
# Performance tracing
enabled = true                # Enable performance tracing
sample_rate = 0.1            # Tracing sample rate (0.0-1.0)
max_spans = 1000              # Maximum number of spans to keep
export_interval = "10s"      # Metrics export interval

[alerts]
# Alerting configuration
enabled = true                # Enable alerting
channels = ["email", "slack"] # Alert channels
severity_levels = ["info", "warning", "critical"] # Severity levels
throttle_interval = "5m"      # Alert throttling interval
escalation_policy = "immediate" # Escalation policy

[reporting]
# Performance reporting
enabled = true                # Enable performance reporting
interval = "1h"               # Reporting interval
format = "json"               # Report format
retention_days = 30           # Report retention period