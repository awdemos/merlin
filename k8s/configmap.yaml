apiVersion: v1
kind: ConfigMap
metadata:
  name: merlin-config
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
data:
  # Application configuration
  RUST_LOG: "info"
  RUST_BACKTRACE: "1"

  # Redis configuration
  REDIS_HOST: "redis-master.merlin-system.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Docker configuration
  DOCKER_HOST: "unix:///var/run/docker.sock"
  DOCKER_TLS_VERIFY: "false"

  # Security configuration
  SECURITY_SCAN_INTERVAL: "3600"
  SECURITY_POLICY_ENFORCEMENT: "true"
  AUDIT_LOG_ENABLED: "true"

  # Monitoring configuration
  PROMETHEUS_PORT: "9090"
  HEALTH_CHECK_INTERVAL: "30"

  # Resource limits
  MAX_CONCURRENT_DEPLOYMENTS: "3"
  DEPLOYMENT_TIMEOUT: "300"

  # Network configuration
  API_PORT: "8080"
  METRICS_PORT: "9090"
  HEALTH_PORT: "8081"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: merlin-security-policies
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
data:
  policies.yaml: |
    security_policies:
      - name: "container-security"
        description: "Container security baseline policy"
        enforcement_level: "mandatory"
        rules:
          - field: "user"
            operator: "not_equals"
            value: "root"
            severity: "critical"
          - field: "privileged"
            operator: "equals"
            value: "false"
            severity: "critical"
          - field: "read_only"
            operator: "equals"
            value: "true"
            severity: "medium"

      - name: "resource-limits"
        description: "Resource limits policy"
        enforcement_level: "recommended"
        rules:
          - field: "memory_limit"
            operator: "greater_than"
            value: "0"
            severity: "medium"
          - field: "cpu_shares"
            operator: "greater_than"
            value: "0"
            severity: "medium"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: merlin-audit-config
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
data:
  audit.yaml: |
    enabled: true
    retention_policy:
      default_retention_days: 180
      max_storage_size_gb: 100
      enable_compression: true
    alert_thresholds:
      failed_authentications_per_minute: 5
      failed_authorizations_per_minute: 10
      critical_events_per_hour: 5
    required_fields:
      - "user_id"
      - "resource"
      - "action"