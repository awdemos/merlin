apiVersion: v1
kind: ServiceAccount
metadata:
  name: merlin-service-account
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: merlin-audit-service-account
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
automountServiceAccountToken: true
---
# RBAC Roles
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: merlin-role
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: [""]
  resources: ["pods/exec", "pods/log", "pods/attach"]
  verbs: ["create", "get", "list"]

- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["extensions"]
  resources: ["deployments", "replicasets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies", "ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]

# Audit-specific role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: merlin-audit-role
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]

- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch", "create"]

- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]

# ClusterRole for cluster-wide access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: merlin-cluster-role
  labels:
    app: merlin-ai-router
    tier: system
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "persistentvolumes", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]

- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]

- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]

# RoleBindings
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: merlin-role-binding
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: merlin-role
subjects:
- kind: ServiceAccount
  name: merlin-service-account
  namespace: merlin-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: merlin-audit-role-binding
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: merlin-audit-role
subjects:
- kind: ServiceAccount
  name: merlin-audit-service-account
  namespace: merlin-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: merlin-cluster-role-binding
  labels:
    app: merlin-ai-router
    tier: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: merlin-cluster-role
subjects:
- kind: ServiceAccount
  name: merlin-service-account
  namespace: merlin-system