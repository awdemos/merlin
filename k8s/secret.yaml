apiVersion: v1
kind: Secret
metadata:
  name: merlin-secrets
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
type: Opaque
data:
  # Redis password (base64 encoded - replace with actual password)
  redis-password: <base64-encoded-password>

  # Docker registry credentials (base64 encoded)
  docker-registry-username: <base64-encoded-username>
  docker-registry-password: <base64-encoded-password>

  # API keys for external services (base64 encoded)
  api-key: <base64-encoded-api-key>

  # TLS certificates (base64 encoded)
  tls-cert: <base64-encoded-certificate>
  tls-key: <base64-encoded-private-key>

  # Security scanning API keys (base64 encoded)
  trivy-api-key: <base64-encoded-trivy-key>
  security-api-key: <base64-encoded-security-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: merlin-docker-config
  namespace: merlin-system
  labels:
    app: merlin-ai-router
    tier: system
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>